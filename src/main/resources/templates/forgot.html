<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Quên mật khẩu</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 shadow-lg" style="width: 350px;">
  <h3 class="text-center mb-4">Quên mật khẩu</h3>

  <form id="forgotForm">
    <div class="mb-3">
      <label class="form-label">Tên đăng nhập hoặc Email</label>
      <input type="text" id="userInput" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-primary w-100">Gửi yêu cầu đặt lại</button>
  </form>

  <div id="result" class="mt-3 text-center fw-bold"></div>

  <div class="d-flex justify-content-between mt-3">
    <a href="/" class="btn btn-outline-secondary btn-sm">Đăng nhập</a>
    <a href="/register" class="btn btn-link btn-sm text-decoration-none">Đăng ký</a>
  </div>
</div>

<script>
  document.getElementById("forgotForm").addEventListener("submit", async function(event) {
    event.preventDefault();

    const email = document.getElementById("userInput").value;
    const resultEl = document.getElementById("result");

    try {
      const response = await fetch("/api/forgot_password", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ email })
      });

      if (response.ok) {
        resultEl.textContent = "Đã gửi hướng dẫn đặt lại mật khẩu qua email!";
        resultEl.classList.remove("text-danger");
        resultEl.classList.add("text-success");
      } else {
        const text = await response.text();
        resultEl.textContent = text || "Không tìm thấy tài khoản!";
        resultEl.classList.remove("text-success");
        resultEl.classList.add("text-danger");
      }
    } catch (error) {
      resultEl.textContent = "Lỗi kết nối server!";
      resultEl.classList.remove("text-success");
      resultEl.classList.add("text-danger");
    }
  });
</script>

</body>
</html>

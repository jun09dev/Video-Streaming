<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Music App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>

    <style>
        body { background: #0f172a; color: white; }
        .container { max-width: 1100px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .music-card {
            background: #1e293b;
            border-radius: 12px;
            overflow: hidden;
            transition: 0.3s;
        }

        .music-card:hover {
            transform: scale(1.03);
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }

        .thumbnail-container { position: relative; cursor: pointer; }

        .thumbnail {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            font-size: 40px;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            padding: 10px 15px;
            opacity: 0;
            transition: 0.3s;
        }

        .thumbnail-container:hover .play-overlay {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .card-body { padding: 10px; }
        .title { font-size: 15px; font-weight: 500; }

        .info {
            display: flex;
            align-items: center;
            margin-top: 8px;
            gap: 10px;
        }

        .avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
        }

        .username {
            cursor: pointer;
        }

        .upload-box {
            background: #1e293b;
            border-radius: 12px;
            padding: 15px;
        }
    </style>
</head>

<body>

<div class="container py-3">

    <h3 class="text-center mb-4">🎵 Music App</h3>

    <div class="d-flex justify-content-between mb-3">
        <button class="btn btn-light" onclick="goToProfile()">👤 Profile</button>
    </div>

    <!-- SEARCH -->
    <div class="mb-3">
        <input type="text" id="searchInput" class="form-control"
               placeholder="🔍 Tìm bài hát..."
               oninput="handleSearch()">
    </div>

    <div id="status" class="text-warning mb-3"></div>

    <!-- LIST -->
    <div id="fileList" class="grid"></div>

    <hr class="my-4">

    <!-- UPLOAD -->
    <h5>⬆️ Upload</h5>

    <form id="uploadForm" class="upload-box">

        <label>🎵 File nhạc</label>
        <input type="file" id="musicInput" class="form-control mb-3" required>

        <label>🖼️ Thumbnail</label>
        <input type="file" id="thumbnailInput" class="form-control mb-3">

        <button class="btn btn-primary w-100">Upload</button>
    </form>

    <div class="progress mt-3" style="height: 20px;">
        <div id="uploadProgress"
             class="progress-bar progress-bar-striped progress-bar-animated"
             style="width: 0%">0%</div>
    </div>

</div>

<script>

    const API_BASE = "http://localhost:8080";
    const UPLOAD_MINIO_SAVE = "/api/upload_minio_save";

    let uploadedMusic = null;
    let uploadedThumbnail = null;
    let searchTimeout = null;

    // ===== AUTH =====
    function getToken() {
        return localStorage.getItem("token");
    }

    // ===== API =====
    async function callApi(url, method="GET", body=null) {

        const headers = {
            "Authorization": "Bearer " + getToken()
        };

        if (body && method !== "GET") {
            headers["Content-Type"] = "application/json";
        }

        const res = await fetch(API_BASE + url, { method, headers, body });

        if (res.status === 401) {
            alert("Hết phiên, đăng nhập lại!");
            localStorage.removeItem("token");
            window.location.href = "/";
            return null;
        }

        return res;
    }

    // ===== NAVIGATION =====
    function goToProfile() {
        window.location.href = "/profile";
    }

    function goToPlayer(id) {
        window.location.href = `/player?songId=${id}`;
    }

    function handleUserClick(userId) {
        if (!userId) {
            alert("Không tìm thấy user!");
            return;
        }
        window.location.href = `/user?userId=${userId}`;
    }

    // ===== RENDER =====
    function renderSongs(data) {

        const list = document.getElementById("fileList");
        list.innerHTML = "";

        if (!data || data.length === 0) {
            list.innerHTML = "<p>Không có bài hát</p>";
            return;
        }

        data.forEach((song) => {

            const div = document.createElement("div");
            div.className = "music-card";

            div.innerHTML = `
            <div class="thumbnail-container" onclick="goToPlayer(${song.id})">
                <img class="thumbnail"
                     src="${song.thumbnailUrl || 'https://picsum.photos/400/200'}">
                <div class="play-overlay">▶</div>
            </div>

            <div class="card-body">
                <div class="title">${song.title}</div>

                <div class="info">
                    <img class="avatar"
                         src="${song.avatarUrl || 'https://picsum.photos/40'}"
                         onclick="event.stopPropagation(); handleUserClick(${song.userId})">

                    <div class="username"
                         onclick="event.stopPropagation(); handleUserClick(${song.userId})">
                         ${song.username || 'Unknown'}
                    </div>
                </div>
            </div>
        `;

            list.appendChild(div);
        });
    }

    // ===== LOAD =====
    async function loadFileList() {

        const res = await callApi("/api/get_file_list");
        if (!res) return;

        const data = await res.json();
        renderSongs(data);
    }

    // ===== SEARCH =====
    function handleSearch() {

        const keyword = document.getElementById("searchInput").value;

        clearTimeout(searchTimeout);

        searchTimeout = setTimeout(async () => {

            if (!keyword) {
                loadFileList();
                return;
            }

            const res = await callApi(`/api/search?keyword=${encodeURIComponent(keyword)}`);
            if (!res) return;

            const data = await res.json();
            renderSongs(data);

        }, 400);
    }

    // ===== UPLOAD =====
    async function uploadToMinio(file, isThumbnail) {

        const res = await fetch(`${API_BASE}/api/upload_minio_url?fileName=${file.name}&isThumbnail=${isThumbnail}`, {
            headers: { Authorization: "Bearer " + getToken() }
        });

        const data = await res.json();

        return new Promise((resolve, reject) => {

            const xhr = new XMLHttpRequest();
            xhr.open("PUT", data.uploadUrl, true);
            xhr.setRequestHeader("Content-Type", file.type);

            xhr.upload.onprogress = (e) => {
                if (!isThumbnail && e.lengthComputable) {
                    const percent = Math.round((e.loaded / e.total) * 100);
                    const bar = document.getElementById("uploadProgress");
                    bar.style.width = percent + "%";
                    bar.textContent = percent + "%";
                }
            };

            xhr.onload = () => {
                if (xhr.status === 200) {
                    resolve({
                        objectName: data.objectName,
                        size: file.size,
                        contentType: file.type
                    });
                } else reject();
            };

            xhr.onerror = reject;
            xhr.send(file);
        });
    }

    async function saveUploadedFile() {

        const body = JSON.stringify({
            objectName: uploadedMusic.objectName,
            contentType: uploadedMusic.contentType,
            size: uploadedMusic.size,
            thumbnailObjectName: uploadedThumbnail ? uploadedThumbnail.objectName : null
        });

        await callApi(UPLOAD_MINIO_SAVE, "POST", body);
    }

    // ===== SUBMIT =====
    document.getElementById("uploadForm").addEventListener("submit", async (e) => {

        e.preventDefault();

        const musicFile = document.getElementById("musicInput").files[0];
        const thumbnailFile = document.getElementById("thumbnailInput").files[0];

        if (!musicFile) return alert("Chọn file nhạc!");

        try {

            document.getElementById("status").innerText = "🎵 Upload nhạc...";
            uploadedMusic = await uploadToMinio(musicFile, false);

            if (thumbnailFile) {
                document.getElementById("status").innerText = "🖼️ Upload thumbnail...";
                uploadedThumbnail = await uploadToMinio(thumbnailFile, true);
            }

            document.getElementById("status").innerText = "💾 Lưu dữ liệu...";
            await saveUploadedFile();

            document.getElementById("status").innerText = "✅ Thành công!";
            loadFileList();

        } catch (e) {
            console.error(e);
            alert("Upload lỗi");
        }
    });

    // ===== INIT =====
    window.onload = loadFileList;

</script>

</body>
</html>

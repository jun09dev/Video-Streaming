<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Đăng ký tài khoản</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 shadow-lg" style="width: 350px;">
  <h3 class="text-center mb-4">Đăng ký tài khoản</h3>

  <form id="registerForm">

    <!-- EMAIL -->
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" id="email" class="form-control" required>
    </div>

    <!-- USERNAME -->
    <div class="mb-3">
      <label class="form-label">user  name</label>
      <input type="text" id="username" class="form-control" required>
    </div>

    <!-- PASSWORD -->
    <div class="mb-3">
      <label class="form-label">Mật khẩu</label>
      <input type="password" id="password" class="form-control" required>
    </div>

    <!-- CONFIRM -->
    <div class="mb-3">
      <label class="form-label">Xác nhận mật khẩu</label>
      <input type="password" id="confirmPassword" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-primary w-100">Tạo tài khoản</button>
  </form>

  <div id="result" class="mt-3 text-center fw-bold"></div>

  <div class="d-flex justify-content-between mt-3">
    <a href="/" class="btn btn-outline-secondary btn-sm">Đăng nhập</a>
    <a href="/forgot" class="btn btn-link btn-sm text-decoration-none">Quên mật khẩu?</a>
  </div>
</div>

<script>
  document.getElementById("registerForm").addEventListener("submit", async function(event) {
    event.preventDefault();

    const email = document.getElementById("email").value;
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirmPassword").value;

    const resultEl = document.getElementById("result");

    if (password !== confirm) {
      resultEl.textContent = "Mật khẩu xác nhận không khớp!";
      resultEl.classList.remove("text-success");
      resultEl.classList.add("text-danger");
      return;
    }

    try {
      const response = await fetch("/api/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          email,
          username,
          password
        })
      });

      if (response.ok) {
        resultEl.textContent = "Đăng ký thành công!";
        resultEl.classList.remove("text-danger");
        resultEl.classList.add("text-success");
      } else {
        const json = await response.json().catch(()=>null);
        resultEl.textContent = json?.message || "Email đã tồn tại!";
        resultEl.classList.remove("text-success");
        resultEl.classList.add("text-danger");
      }
    } catch (error) {
      resultEl.textContent = "Lỗi kết nối server!";
      resultEl.classList.remove("text-success");
      resultEl.classList.add("text-danger");
    }
  });
</script>

</body>
</html>

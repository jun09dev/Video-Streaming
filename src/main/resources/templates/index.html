<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <title>Đăng nhập</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Google Login -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body class="bg-light d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 shadow-lg" style="width: 380px;">
  <h3 class="text-center mb-4">Đăng nhập</h3>

  <!-- LOGIN FORM -->
  <form id="loginForm">
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" id="email" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Mật khẩu</label>
      <input type="password" id="password" class="form-control" required>
    </div>
    <button id="submitBtn" type="submit" class="btn btn-primary w-100">
      <span id="btnText">Đăng nhập</span>
      <span id="btnSpinner" class="spinner-border spinner-border-sm ms-2 d-none"></span>
    </button>
  </form>

  <div class="mb-3 text-end">
    <a href="/forgot" class="text-decoration-none">Quên mật khẩu?</a>
  </div>

  <div class="text-center my-3">
    <small class="text-muted">Hoặc đăng nhập bằng</small>
  </div>

  <div class="text-center mt-3">
    <small>Chưa có tài khoản? <a href="/register">Đăng ký</a></small>
  </div>

  <!-- GOOGLE -->
  <div class="text-center">
    <div id="g_id_onload"
         data-client_id="729007110285-4js4oqn73ncitsmeh3l2ou7h2umj490e.apps.googleusercontent.com"
         data-callback="handleCredentialResponse"
         data-auto_prompt="false">
    </div>
    <div class="g_id_signin" data-type="standard" data-size="large"></div>
  </div>

  <div id="result" class="mt-3 text-center fw-bold"></div>
</div>

<script>
  const API_BASE = "http://localhost:8080";

  function showResult(text, type) {
    const el = document.getElementById("result");
    el.textContent = text;
    el.className = "mt-3 text-center fw-bold " + (type === "success" ? "text-success" : "text-danger");
  }

  function setSubmitting(on) {
    document.getElementById("submitBtn").disabled = on;
    document.getElementById("btnSpinner").classList.toggle("d-none", !on);
    document.getElementById("btnText").textContent = on ? "Đang xử lý..." : "Đăng nhập";
  }

  // ===== LOGIN BẰNG EMAIL =====
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
      showResult('Nhập đủ email và mật khẩu', 'error');
      return;
    }

    setSubmitting(true);

    try {
      const res = await fetch(`${API_BASE}/api/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      if (res.ok) {
        const token = await res.text(); // JWT từ backend
        localStorage.setItem("token", token); // Lưu token
        showResult('Đăng nhập thành công!', 'success');

        // Chuyển trang home
        setTimeout(() => window.location.href = '/home', 700);
      } else {
        const msg = await res.text();
        showResult(msg || 'Sai email hoặc mật khẩu', 'error');
      }

    } catch (err) {
      console.error(err);
      showResult('Không kết nối được server!', 'error');
    } finally {
      setSubmitting(false);
    }
  });

  // ===== GOOGLE LOGIN =====
  async function handleCredentialResponse(response) {
    const idToken = response.credential;

    try {
      const res = await fetch(`${API_BASE}/api/login_google`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ idToken })
      });

      const data = await res.json();

      if (res.ok) {
        localStorage.setItem("token", data.token); // Lưu JWT
        showResult('Đăng nhập Google thành công!', 'success');
        setTimeout(() => window.location.href = '/home', 700);
      } else {
        showResult(data.message || 'Google login lỗi', 'error');
      }

    } catch (err) {
      console.error(err);
      showResult('Không kết nối được server!', 'error');
    }
  }

  // ===== HÀM GỌI API BẢO VỆ =====
  async function callProtectedApi(url, method = 'GET', body = null) {
    const token = localStorage.getItem("token");
    if (!token) {
      showResult('Bạn chưa đăng nhập!', 'error');
      return;
    }

    try {
      const res = await fetch(`${API_BASE}${url}`, {
        method,
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: body ? JSON.stringify(body) : null
      });

      if (!res.ok) {
        if (res.status === 401) {
          showResult('Phiên đã hết hạn, vui lòng đăng nhập lại', 'error');
          localStorage.removeItem("token");
          setTimeout(() => window.location.href = '/login', 1000);
        } else {
          const msg = await res.text();
          showResult(msg || 'Lỗi khi gọi API', 'error');
        }
        return null;
      }

      return await res.json(); // trả data
    } catch (err) {
      console.error(err);
      showResult('Không kết nối được server!', 'error');
      return null;
    }
  }

  // Ví dụ: sử dụng callProtectedApi
  // callProtectedApi('/api/get_file_list').then(data => console.log(data));
</script>

</body>
</html>

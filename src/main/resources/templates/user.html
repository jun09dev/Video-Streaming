<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>User Profile</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <style>
    body { background: #2c50a6; color: white; }
    .container { max-width: 1000px; }

    .profile-box {
      background: #d7e0ee;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .card {
      background: #5c86cc;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
    }

    .thumbnail {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .title {
      padding: 10px;
    }
  </style>
</head>

<body>

<div class="container py-4">

  <div class="profile-box">
    <img id="avatar" class="avatar mb-2">
    <h4 id="username"></h4>
  </div>

  <h5 class="mt-4">🎵 Video đã đăng</h5>

  <div id="songList" class="grid"></div>

</div>

<script>

  const API_BASE = "http://localhost:8080";

  function getToken() {
    return localStorage.getItem("token");
  }

  function getUserId() {
    const params = new URLSearchParams(window.location.search);
    return params.get("userId");
  }

  function goToPlayer(id) {
    window.location.href = `/player?songId=${id}`;
  }

  async function loadUserProfile() {

    const userId = getUserId();

    const res = await fetch(`${API_BASE}/api/users/${userId}/profile`, {
      headers: { Authorization: "Bearer " + getToken() }
    });

    const data = await res.json();

    document.getElementById("avatar").src =
            data.avatarUrl || "https://via.placeholder.com/120";

    document.getElementById("username").innerText = data.username;

    const list = document.getElementById("songList");
    list.innerHTML = "";

    data.songs.forEach(song => {

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
                <img class="thumbnail"
                     src="${song.thumbnailUrl || 'https://via.placeholder.com/300'}">

                <div class="title">${song.title}</div>
            `;

      div.onclick = () => goToPlayer(song.id);

      list.appendChild(div);
    });
  }

  loadUserProfile();

</script>

</body>
</html>
